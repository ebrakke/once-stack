{{template "once/header" .}}
<div class="max-w-xl mx-auto">
    <h1 class="text-xl font-bold mb-4">{{if .Data.IsNew}}New Note{{else}}Edit Note{{end}}</h1>

    <form method="POST" action="{{if .Data.IsNew}}/notes{{else}}/notes/{{.Data.Slug}}{{end}}" class="space-y-4">
        <div class="once-field">
            <label for="title" class="once-label">Title</label>
            <input type="text" id="title" name="title" value="{{if .Data.Note}}{{.Data.Note.Title}}{{end}}" required
                   class="once-input">
        </div>

        <div class="once-field">
            <label for="body" class="once-label">Body (Markdown)</label>
            <textarea id="body" name="body" rows="14" class="once-textarea">{{.Data.Content}}</textarea>
        </div>

        <div class="flex items-center gap-3">
            <button type="submit" class="once-btn once-btn-primary">
                {{if .Data.IsNew}}Create{{else}}Save{{end}}
            </button>
            <a href="{{if .Data.IsNew}}/{{else}}/notes/{{.Data.Slug}}{{end}}"
               class="once-btn once-btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{{template "once/footer" .}}
