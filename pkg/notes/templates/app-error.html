{{template "once/header" .}}
<div class="py-12">
    <div class="once-empty">
        <h1 class="once-empty-title">{{.Page.Title}}</h1>
        {{if .Data.Error}}
        <p class="once-empty-body">{{.Data.Error}}</p>
        {{end}}
        <div class="mt-4">
            <a href="/" class="once-btn once-btn-secondary">Back to Notes</a>
        </div>
    </div>
</div>
{{template "once/footer" .}}
