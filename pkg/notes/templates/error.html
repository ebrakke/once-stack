{{template "header" .}}
<div class="max-w-xl mx-auto text-center py-12">
    <h1 class="text-xl font-bold text-gray-900 mb-2">{{.Title}}</h1>
    {{if .Error}}
    <p class="text-gray-500">{{.Error}}</p>
    {{end}}
    <a href="/"
       class="inline-flex items-center justify-center mt-6 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors min-h-[44px]">
        Back to Notes
    </a>
</div>
{{template "footer" .}}
