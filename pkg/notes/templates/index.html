{{template "once/header" .}}
<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h1 class="text-xl font-bold">Notes</h1>
        <a href="/new" class="once-btn once-btn-primary">New Note</a>
    </div>

    {{if .Data.Notes}}
    <div class="space-y-2">
        {{range .Data.Notes}}
        <div class="once-card once-card-hover">
            <a href="/notes/{{.ID}}" class="block px-4 py-3">
                <h2 class="font-medium text-once-text">{{.Title}}</h2>
                <p class="text-xs text-once-muted mt-1">{{.UpdatedAt.Format "Jan 2, 2006 3:04 PM"}}</p>
            </a>
        </div>
        {{end}}
    </div>
    {{else}}
    <div class="once-empty">
        <p class="once-empty-body">No notes yet.</p>
        <a href="/new" class="once-btn once-btn-primary mt-4">Create your first note</a>
    </div>
    {{end}}
</div>
{{template "once/footer" .}}
