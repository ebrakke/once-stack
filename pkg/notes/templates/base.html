{{define "header"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Markdown content styling – no Tailwind typography plugin dependency */
        .md-content h1 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .md-content h2 { font-size: 1.25rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; }
        .md-content h3 { font-size: 1.125rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; }
        .md-content h4 { font-size: 1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; }
        .md-content p { margin-bottom: 1rem; line-height: 1.625; }
        .md-content ul, .md-content ol { margin-bottom: 1rem; padding-left: 1.5rem; }
        .md-content ul { list-style-type: disc; }
        .md-content ol { list-style-type: decimal; }
        .md-content li { margin-bottom: 0.25rem; line-height: 1.625; }
        .md-content pre { background-color: #1e293b; color: #e2e8f0; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem; overflow-x: auto; font-size: 0.875rem; line-height: 1.5; }
        .md-content code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.875em; }
        .md-content :not(pre) > code { background-color: #f1f5f9; color: #1e293b; padding: 0.125rem 0.375rem; border-radius: 0.25rem; }
        .md-content blockquote { border-left: 4px solid #cbd5e1; padding-left: 1rem; margin-bottom: 1rem; color: #475569; font-style: italic; }
        .md-content a { color: #2563eb; text-decoration: underline; }
        .md-content a:hover { color: #1d4ed8; }
        .md-content table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        .md-content th, .md-content td { border: 1px solid #e2e8f0; padding: 0.5rem 0.75rem; text-align: left; }
        .md-content th { background-color: #f8fafc; font-weight: 600; }
        .md-content hr { border: 0; border-top: 1px solid #e2e8f0; margin: 1.5rem 0; }
        .md-content img { max-width: 100%; height: auto; border-radius: 0.375rem; margin: 1rem 0; }
        .md-content { overflow-wrap: break-word; overflow-x: auto; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex flex-col">
    <header class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-2xl mx-auto px-4 h-12 flex items-center">
            <a href="/" class="font-semibold text-gray-900 hover:text-blue-600 transition-colors">Notes</a>
        </div>
    </header>
    <main class="flex-1 w-full max-w-2xl mx-auto px-4 py-6">
{{end}}

{{define "footer"}}
    </main>
</body>
</html>{{end}}
