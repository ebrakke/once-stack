{{template "once/header" .}}
<article class="max-w-xl mx-auto">
    <div class="flex items-start justify-between mb-4 gap-2">
        <h1 class="text-xl font-bold break-words">{{.Data.Note.Title}}</h1>
        <div class="flex items-center gap-2 shrink-0">
            <a href="/notes/{{.Data.Note.ID}}/edit" class="once-btn once-btn-secondary">Edit</a>
        </div>
    </div>
    <p class="text-xs text-once-muted mb-6">{{.Data.Note.UpdatedAt.Format "Jan 2, 2006 3:04 PM"}}</p>

    <div class="once-card p-4 sm:p-6">
        <div class="once-prose">
            {{.Data.BodyHTML}}
        </div>
    </div>

    <div class="mt-6">
        <form method="POST" action="/notes/{{.Data.Note.ID}}/delete" onsubmit="return confirm('Delete this note?')">
            <button type="submit" class="once-btn once-btn-danger">Delete</button>
        </form>
    </div>
</article>
{{template "once/footer" .}}
